# WC26 Office Predictor — local/self-hosted deployment.
#
# Copy .env.example to .env.local, fill in real values, then run:
#   docker compose --env-file .env.local up --build
#
# The --env-file flag is required: the ${VAR} substitutions below (and the
# build args) are interpolated from Compose's env file, which defaults to .env.
# Point it at .env.local so both build-time and runtime values resolve.
#
# NEXT_PUBLIC_* vars are needed at BUILD time (they get inlined into the client
# bundle) AND at runtime, so they appear under both `build.args` and
# `environment`. The server-only secrets are runtime-only (via env_file).

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    image: wc26-predictor
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      # Public config also needs to be present at runtime for server components.
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
